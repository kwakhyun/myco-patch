name: python-mutable-default-argument
version: 0.6.0
language: python
description: Detects mutable default arguments that can leak state across Python function calls.
risk_type: mutable_default_argument
triggers:
  path_keywords:
    - cache
    - state
    - accumulator
    - default
    - options
  code_patterns:
    - "=[]"
    - "={}"
    - "=set()"
    - "=list()"
    - "=dict()"
probe:
  type: pytest
  strategy: static_marker
budget:
  max_input_tokens: 6000
  max_output_tokens: 1200
  max_runtime_seconds: 60
safety:
  network: deny
  write_paths:
    - .myco/probes/generated_tests
    - .myco/reports
    - .myco/memory
